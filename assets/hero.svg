  <rect width="1200" height="420" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="34" fill="url(#glowA)"/>
  <rect width="1200" height="420" rx="34" fill="url(#glowB)"/>
  <g opacity="0.16">
