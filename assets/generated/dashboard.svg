<svg width="1200" height="980" viewBox="0 0 1200 980" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">voyage-craft live GitHub dashboard</title>
  <desc id="desc">Fallback unified dashboard waiting for authenticated data refresh.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="980"><stop stop-color="#020617"/><stop offset="0.5" stop-color="#111827"/><stop offset="1" stop-color="#164E63"/></linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 120) rotate(48) scale(560 300)"><stop stop-color="#22D3EE" stop-opacity="0.42"/><stop offset="1" stop-color="#22D3EE" stop-opacity="0"/></radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1040 720) rotate(155) scale(620 360)"><stop stop-color="#EC4899" stop-opacity="0.35"/><stop offset="1" stop-color="#EC4899" stop-opacity="0"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.42"/></filter>
  </defs>
  <rect width="1200" height="980" rx="34" fill="url(#bg)"/><rect width="1200" height="980" rx="34" fill="url(#glowA)"/><rect width="1200" height="980" rx="34" fill="url(#glowB)"/>
  <g opacity="0.12"><path d="M0 98H1200M0 196H1200M0 294H1200M0 392H1200M0 490H1200M0 588H1200M0 686H1200M0 784H1200M0 882H1200M120 0V980M240 0V980M360 0V980M480 0V980M600 0V980M720 0V980M840 0V980M960 0V980M1080 0V980" stroke="#E5E7EB"/></g>
  <text x="64" y="86" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="38" font-weight="800">voyage-craft live dashboard</text>
  <text x="64" y="126" fill="#A5F3FC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="650">fallback preview · waiting for authenticated GitHub data refresh</text>
  <g filter="url(#shadow)"><rect x="64" y="170" width="1072" height="170" rx="26" fill="#020617" fill-opacity="0.62" stroke="#22D3EE" stroke-opacity="0.32"/><text x="104" y="236" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="34" font-weight="800">Unified local SVG system is ready</text><text x="104" y="286" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="23">The next authenticated refresh will render repositories, languages, stars, forks and recent signals here.</text></g>
  <text x="64" y="430" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="800">repository constellation</text>
  <g filter="url(#shadow)"><rect x="64" y="468" width="520" height="110" rx="22" fill="#020617" fill-opacity="0.62" stroke="#22D3EE" stroke-opacity="0.28"/><text x="98" y="516" fill="#A5F3FC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="800">voyage-craft</text><text x="98" y="552" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">local assets · one visual language · stable rendering</text></g>
  <g filter="url(#shadow)"><rect x="616" y="468" width="520" height="110" rx="22" fill="#020617" fill-opacity="0.62" stroke="#EC4899" stroke-opacity="0.28"/><text x="650" y="516" fill="#FBCFE8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="800">dashboard.svg</text><text x="650" y="552" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="18">generated by workflow · committed with README</text></g>
  <text x="64" y="674" fill="#F8FAFC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="800">design contract</text>
  <text x="64" y="724" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="23">No remote stat-card services. No mixed image styles. No GIF background mismatch.</text>
  <text x="64" y="764" fill="#CBD5E1" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="23">Every visible panel now shares the same tokyo-night glass background and accent palette.</text>
  <rect x="64" y="842" width="1072" height="3" fill="#22D3EE" fill-opacity="0.6"/>
  <text x="64" y="900" fill="#A5F3FC" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="20" font-weight="700">preview mode · generated fallback</text>
